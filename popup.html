<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cats Shields</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <img src="icons/icon.svg" alt="" class="topbar-icon" width="56" height="56" />
      <div class="topbar-copy">
        <div class="topbar-title-row">
          <h1>Cats Shields</h1>
          <strong id="count" class="metric-value" aria-live="polite">…</strong>
        </div>
        <p>Smart keyword blocking for anything you would rather replace with cats.</p>
      </div>
    </header>

    <section class="card" aria-label="Starter packs">
      <div class="card-head">
        <p class="card-kicker">Starter packs</p>
        <h2 class="card-title">Choose a fear mode</h2>
      </div>
      <div id="preset-list" class="preset-grid"></div>
      <div class="card-actions">
        <button id="paste-pack-btn" class="btn btn-ghost" type="button">Paste pack</button>
        <button id="apply-pack-btn" class="btn btn-accent" type="button">Apply pack</button>
      </div>
    </section>

    <section class="card" aria-label="Active keywords">
      <div class="card-head">
        <p class="card-kicker">Your list</p>
        <h2 class="card-title">Active keywords</h2>
      </div>

      <div class="input-row">
        <input
          type="text"
          id="new-keyword"
          placeholder="Add keyword or comma-separated keywords…"
          autocomplete="off"
          spellcheck="false"
          aria-label="New keyword"
        />
        <button id="add-btn" class="btn btn-accent" type="button">Add</button>
      </div>

      <p id="feedback" class="toast" role="status" aria-live="polite" hidden></p>
      <div id="keywords-list" class="chip-grid" hidden></div>
      <p id="keywords-empty" class="empty-hint" hidden></p>
    </section>

    <footer class="card card-footer">
      <p>Built for people who would rather see cats than everything else.</p>
      <button id="reset-btn" class="btn btn-ghost btn-wide" type="button"></button>
    </footer>
  </main>

  <script src="defaults.js"></script>
  <script src="popup.js"></script>
</body>
</html>
