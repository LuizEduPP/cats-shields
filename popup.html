<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cats Shields</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="bg-orb bg-orb-a" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-b" aria-hidden="true"></div>
  <div class="shell">

    <header>
      <div class="logo-wrap" aria-hidden="true">
        <span class="logo">🐱</span>
      </div>
      <div class="header-text">
        <span class="eyebrow">Cats Shields</span>
        <h1>Cats Shields</h1>
        <p class="subcopy">Smart keyword blocking for anything you would rather replace with cats.</p>
      </div>
    </header>

    <section class="status-bar" aria-label="Status">
      <p id="count">loading...</p>
    </section>

    <section class="preset-panel" aria-label="Starter packs">
      <div class="preset-head">
        <div>
          <p class="preset-kicker">Starter packs</p>
          <h2 class="preset-title">Choose a fear mode</h2>
        </div>
        <button id="paste-pack-btn" class="secondary-btn" type="button">Paste pack</button>
      </div>
      <div id="preset-list" class="preset-list"></div>
    </section>

    <div class="add-row">
      <input
        type="text"
        id="new-keyword"
        placeholder="Add keyword or comma-separated keywords..."
        autocomplete="off"
        spellcheck="false"
      />
      <button id="add-btn" aria-label="Add keyword">Add</button>
    </div>

    <div id="keywords-list" class="keywords-list"></div>

    <footer>
      <p class="footer-copy">Built for people who would rather see cats than everything else.</p>
      <button id="reset-btn">↺ Restore defaults</button>
    </footer>
  </div>

  <script src="defaults.js"></script>
  <script src="popup.js"></script>
</body>
</html>
